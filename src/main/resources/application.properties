spring.application.name=Natural_beauty
spring.data.rest.detection-strategy=ANNOTATED
spring.jpa.hibernate.ddl-auto=update

# PostgreSQL (allineato a compose.yaml)
spring.datasource.url=jdbc:postgresql://localhost:5435/natural_beauty
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT (HS256: chiave >= 32 byte)
app.jwt.secret=dev-only-cambia-in-produzione-min-32-characters!!
app.jwt.expiration-ms=1800000
# Primo avvio: crea ADMIN se l'email non esiste
app.security.bootstrap.email=admin@naturalbeauty.local
app.security.bootstrap.password=changeme
